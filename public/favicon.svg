<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo claro (cor primária da manicure) -->
  <rect width="32" height="32" rx="6" fill="#FAF7F5"/>
  <!-- Tampa do esmalte (topo) -->
  <rect x="10" y="3" width="12" height="9" rx="3" fill="#9D5F87"/>
  <!-- Gargalo da garrafa (conector) -->
  <rect x="13" y="11" width="6" height="4" fill="#C084A0"/>
  <!-- Corpo principal do esmalte -->
  <rect x="8" y="14" width="16" height="14" rx="4" fill="#C084A0"/>
  <!-- Brilho no frasco -->
  <rect x="11" y="16" width="2.5" height="9" rx="1.2" fill="rgba(255,255,255,0.45)"/>
</svg>
